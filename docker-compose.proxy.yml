# Optional: Caddy reverse proxy for production deploy with domains (portal, admin, gov, agent, mobile).
# Use: docker compose -f docker-compose.yml -f docker-compose.proxy.yml up -d
# Requires: Caddyfile in repo root. DNS: point all five domains to this host.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - app

volumes:
  caddy_data: {}
